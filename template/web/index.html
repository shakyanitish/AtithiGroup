<body
    class="bg-background-light text-text-main dark:text-white font-display antialiased overflow-x-hidden selection:bg-primary selection:text-text-main">
    <!-- Sticky Transparent Navbar -->
    <nav id="main-nav" class="lg:absolute top-0 left-0 right-0 z-50 w-full transition-all duration-300">
        <!-- Background Overlay - Hidden by default, shown on scroll -->
        <div id="nav-bg"
            class="absolute color-overlay border-surface-light dark:bg-background-dark/90 duration-300 inset-0 opacity-100 transition-opacity">
        </div>
        <div class="relative layout-container flex justify-center w-full mb-5  xl:mb-0">
            <div class=" flex items-center justify-center mt-4  px-6">
                <!-- Logo -->
                <div class="flex flex-col items-center text-text-main dark:text-white z-10">
                    <div class=" size-20 md:size-40 text-primary">
                        <jcms:site:logo/>
                    </div>
                </div>
            </div>
        </div>


    </nav>



    <!-- Hero Section -->
    <section
        class="relative min-h-80 md:min-h-[50vh] xl:min-h-screen w-full flex items-center justify-center overflow-hidden">
        <!-- Background Image with Overlay -->
        <jcms:module:slideshow-uc/>

        <!-- Scroll Indicator -->
        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-10 animate-bounce text-white/70">
            <span class="material-symbols-outlined text-4xl">keyboard_arrow_down</span>
        </div>
    </section>
    <!-- Philosophy Headline Section -->
    <jcms:module:home-article/>
    <!-- Modernized Property Showcase: Suites & Resorts -->
    <section class="py-20 px-6 md:px-10 bg-white dark:bg-background-dark" id="property-showcase">
        <div class="max-w-[1280px] mx-auto space-y-24">

            <!-- Atithi Suite: City Living -->
            <jcms:module:programlist/>



        </div>
    </section>



    <!-- Board Members Section -->
    <jcms:module:team/>

    <!-- Blog Section -->
    <jcms:module:homebloglist/>

    <!-- Minimal Footer -->
    <jcms:module:footer/>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navBg = document.getElementById('nav-bg');
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');

            // Scroll Effect
            const handleScroll = () => {
                if (window.scrollY > 50) {
                    if (navBg) navBg.classList.replace('opacity-0', 'opacity-100');
                } else {
                    if (navBg) navBg.classList.replace('opacity-100', 'opacity-0');
                }
            };

            window.addEventListener('scroll', handleScroll);
            handleScroll(); // Initial check

            // Mobile Menu Toggle
            if (mobileMenuBtn && mobileMenu) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
            }

            // Initialize Static Carousels
            $(document).ready(function () {
                $(".gallery-slider").owlCarousel({
                    items: 2,
                    loop: true,
                    margin: 10,
                    nav: false,
                    dots: true,
                    autoplay: true,
                    autoplayTimeout: 3000,
                    autoplayHoverPause: true,
                    animateOut: 'fadeOut',
                    animateIn: 'fadeIn'
                });

                $(".testimonial-slider").owlCarousel({
                    items: 1,
                    loop: true,
                    margin: 20,
                    nav: false,
                    dots: true,
                    autoplay: true,
                    autoplayTimeout: 5000,
                    autoplayHoverPause: true
                });

                // Initialize Blog Slider (Populated by PHP)
                const blogContainer = $('#dynamic-blog-container');
                if (blogContainer.length) {
                    blogContainer.owlCarousel({
                        loop: true,
                        margin: 30,
                        nav: false,
                        dots: true,
                        autoplay: true,
                        autoplayTimeout: 6000,
                        responsive: {
                            0: { items: 1 },
                            768: { items: 2 },
                            1024: { items: 3 }
                        }
                    });
                }
            });
        });
    </script>
</body>
